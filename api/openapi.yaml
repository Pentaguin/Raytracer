openapi: 3.0.3

info:
  title: Ray Tracer API
  version: 1.0.0

paths:
  /render/image:
    get:
      summary: Render a ray traced image
      description: Returns a generated ray traced image as PNG
      operationId: renderImage
      parameters:
        - name: width
          in: query
          required: true
          schema:
            type: integer
            minimum: 100
            maximum: 500
            default: 300
        - name: height
          in: query
          required: true
          schema:
            type: integer
            minimum: 100
            maximum: 500
            default: 300
        - name: samplesPerPixel
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: vfov
          description: Vertical field of vision
          in: query
          required: true
          schema:
            type: double
            default: 90
      responses:
        "200":
          description: Rendered image
          content:
            image/png:
              schema:
                type: string
                format: binary